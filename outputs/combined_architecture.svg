<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Shared benchmark architecture sweep</title>
  <desc id="desc">Heatmap of relative L2 error across depth and width combinations for the combined benchmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f5f7fc"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="512" rx="20" fill="#ffffff" stroke="#d7deef"/>

  <text x="56" y="72" font-family="Georgia, serif" font-size="30" fill="#183153">Combined Benchmark Architecture Grid</text>
  <text x="56" y="102" font-family="Arial, sans-serif" font-size="16" fill="#53657d">Source: outputs/combined_arch_grid.csv</text>

  <rect x="56" y="132" width="250" height="110" rx="16" fill="#f5fbf6" stroke="#d5ead6"/>
  <text x="78" y="166" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Best shared configuration</text>
  <text x="78" y="210" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1b7f3b">5 layers × 64</text>
  <text x="78" y="236" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Relative L2 = 0.26585</text>

  <rect x="332" y="132" width="572" height="110" rx="16" fill="#fff8ef" stroke="#f0d7b1"/>
  <text x="354" y="166" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Reading the sweep</text>
  <text x="354" y="198" font-family="Arial, sans-serif" font-size="16" fill="#183153">Depth matters more than width in this shared benchmark,</text>
  <text x="354" y="220" font-family="Arial, sans-serif" font-size="16" fill="#183153">and the best cell sits in the deepest, widest tested model.</text>

  <text x="184" y="304" font-family="Arial, sans-serif" font-size="15" fill="#6a7d96">width = 32</text>
  <text x="408" y="304" font-family="Arial, sans-serif" font-size="15" fill="#6a7d96">width = 64</text>
  <text x="72" y="356" font-family="Arial, sans-serif" font-size="15" fill="#6a7d96">2 layers</text>
  <text x="72" y="420" font-family="Arial, sans-serif" font-size="15" fill="#6a7d96">3 layers</text>
  <text x="72" y="484" font-family="Arial, sans-serif" font-size="15" fill="#6a7d96">5 layers</text>

  <rect x="160" y="322" width="180" height="56" rx="14" fill="#d9e6fb" stroke="#b9d0f7"/>
  <rect x="384" y="322" width="180" height="56" rx="14" fill="#d7e5fb" stroke="#b9d0f7"/>
  <rect x="160" y="386" width="180" height="56" rx="14" fill="#c8dbfb" stroke="#a5c5f3"/>
  <rect x="384" y="386" width="180" height="56" rx="14" fill="#93b7f1" stroke="#6d9de7"/>
  <rect x="160" y="450" width="180" height="56" rx="14" fill="#bdd4fa" stroke="#9dbdf0"/>
  <rect x="384" y="450" width="180" height="56" rx="14" fill="#bfe8cb" stroke="#7bc08b" stroke-width="3"/>

  <text x="250" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">1.363</text>
  <text x="474" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">1.419</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">1.274</text>
  <text x="474" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">0.694</text>
  <text x="250" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">0.884</text>
  <text x="474" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0d5e28">0.266</text>

  <rect x="634" y="322" width="250" height="184" rx="16" fill="#f8fafc" stroke="#dde6f0"/>
  <text x="658" y="356" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Takeaway</text>
  <text x="658" y="390" font-family="Arial, sans-serif" font-size="15" fill="#53657d">2-layer models remain above 1.36 relative</text>
  <text x="658" y="412" font-family="Arial, sans-serif" font-size="15" fill="#53657d">L2 regardless of width.</text>
  <text x="658" y="444" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Moving from 3×64 to 5×64 drops error</text>
  <text x="658" y="466" font-family="Arial, sans-serif" font-size="15" fill="#53657d">from 0.694 to 0.266, the clearest gain</text>
  <text x="658" y="488" font-family="Arial, sans-serif" font-size="15" fill="#53657d">in the standardized cross-problem study.</text>
</svg>