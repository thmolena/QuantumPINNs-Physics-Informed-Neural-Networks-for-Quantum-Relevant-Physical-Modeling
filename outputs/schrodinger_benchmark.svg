<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Time-dependent Schrodinger benchmark</title>
  <desc id="desc">Static visualization of density error and norm evolution across time for the Schrodinger benchmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#eef7f8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="512" rx="20" fill="#ffffff" stroke="#cde4e6"/>

  <text x="56" y="72" font-family="Georgia, serif" font-size="30" fill="#183153">Time-Dependent Wavepacket Benchmark</text>
  <text x="56" y="102" font-family="Arial, sans-serif" font-size="16" fill="#53657d">Source: outputs/schrodinger_benchmark.csv</text>

  <rect x="56" y="126" width="256" height="124" rx="16" fill="#f3f8ff" stroke="#d6e4ff"/>
  <text x="78" y="160" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Initial density relative L2</text>
  <text x="78" y="206" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0d4fb3">7.92e-8</text>
  <text x="78" y="234" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Essentially exact at t = 0.</text>

  <rect x="332" y="126" width="256" height="124" rx="16" fill="#f5fbf6" stroke="#d5ead6"/>
  <text x="354" y="160" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Final density relative L2</text>
  <text x="354" y="206" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1b7f3b">5.66e-2</text>
  <text x="354" y="234" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Controlled error at t = 1.</text>

  <rect x="608" y="126" width="296" height="124" rx="16" fill="#fff9f1" stroke="#f0d7b1"/>
  <text x="630" y="160" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Norm preservation band</text>
  <text x="630" y="206" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#c06d00">0.9931 - 1.0119</text>
  <text x="630" y="234" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Close to the exact unit norm across the interval.</text>

  <text x="56" y="296" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Density error over time</text>
  <line x1="84" y1="468" x2="470" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="84" y1="328" x2="84" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="84" y1="398" x2="470" y2="398" stroke="#dfe8f5" stroke-width="1.5"/>
  <line x1="84" y1="328" x2="470" y2="328" stroke="#dfe8f5" stroke-width="1.5"/>
  <text x="54" y="472" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.00</text>
  <text x="54" y="402" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.05</text>
  <text x="54" y="332" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.10</text>
  <text x="80" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0</text>
  <text x="266" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.5</text>
  <text x="454" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.0</text>
  <polyline fill="none" stroke="#0d4fb3" stroke-width="4" points="84,468 103,327 122,351 140,385 159,410 178,422 197,427 216,429 235,427 253,425 272,426 291,429 310,432 329,433 348,432 366,428 385,424 404,420 423,410 442,392 470,389"/>
  <circle cx="84" cy="468" r="5" fill="#0d4fb3"/>
  <circle cx="470" cy="389" r="5" fill="#0d4fb3"/>
  <text x="104" y="318" font-family="Arial, sans-serif" font-size="12" fill="#183153">peak early transient</text>
  <text x="446" y="378" font-family="Arial, sans-serif" font-size="12" fill="#183153">final error</text>

  <text x="528" y="296" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Predicted norm over time</text>
  <line x1="556" y1="468" x2="892" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="556" y1="328" x2="556" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <rect x="556" y="360" width="336" height="42" fill="#f6fbf6" stroke="#d5ead6"/>
  <text x="900" y="385" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">exact norm = 1</text>
  <text x="520" y="472" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.99</text>
  <text x="520" y="403" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.00</text>
  <text x="520" y="332" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.02</text>
  <text x="552" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0</text>
  <text x="716" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.5</text>
  <text x="878" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.0</text>
  <polyline fill="none" stroke="#1b7f3b" stroke-width="4" points="556,398 573,393 590,397 607,371 624,369 641,379 658,393 675,398 692,400 709,393 726,383 743,382 760,390 777,406 794,424 811,437 828,438 845,420 862,378 892,328"/>
  <circle cx="556" cy="398" r="5" fill="#1b7f3b"/>
  <circle cx="892" cy="328" r="5" fill="#1b7f3b"/>
  <text x="815" y="318" font-family="Arial, sans-serif" font-size="12" fill="#183153">slight late overshoot</text>
</svg>