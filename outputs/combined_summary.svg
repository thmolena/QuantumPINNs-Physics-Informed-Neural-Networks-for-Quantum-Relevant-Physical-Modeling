<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Combined benchmark summary and noise robustness</title>
  <desc id="desc">Static visualization summarizing problem-level benchmark results and the noise robustness sweep.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff9f4"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="512" rx="20" fill="#ffffff" stroke="#e4dcca"/>

  <text x="56" y="72" font-family="Georgia, serif" font-size="30" fill="#183153">Combined Benchmark: Breadth and Robustness</text>
  <text x="56" y="102" font-family="Arial, sans-serif" font-size="16" fill="#53657d">Sources: outputs/combined_summary.csv and outputs/combined_noise_robustness.csv</text>

  <text x="56" y="144" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Problem-wise relative L2 / energy summary</text>
  <rect x="56" y="170" width="412" height="324" rx="16" fill="#f9fbff" stroke="#dfe8f5"/>
  <line x1="112" y1="444" x2="430" y2="444" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="112" y1="230" x2="112" y2="444" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="112" y1="337" x2="430" y2="337" stroke="#dfe8f5" stroke-width="1.5"/>
  <line x1="112" y1="230" x2="430" y2="230" stroke="#dfe8f5" stroke-width="1.5"/>
  <text x="74" y="448" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0</text>
  <text x="70" y="341" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.07</text>
  <text x="66" y="234" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.14</text>

  <rect x="136" y="261" width="52" height="183" rx="8" fill="#5b8fe1"/>
  <rect x="230" y="236" width="52" height="208" rx="8" fill="#3174d6"/>
  <rect x="324" y="392" width="52" height="52" rx="8" fill="#f0cc86"/>
  <text x="162" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#183153">QHO 0</text>
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#183153">QHO 1</text>
  <text x="350" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#183153">Anharm.</text>
  <text x="130" y="254" font-family="Arial, sans-serif" font-size="12" fill="#183153">rel L2 0.1196</text>
  <text x="224" y="229" font-family="Arial, sans-serif" font-size="12" fill="#183153">rel L2 0.1364</text>
  <text x="316" y="385" font-family="Arial, sans-serif" font-size="12" fill="#183153">ΔE 0.0353</text>
  <text x="112" y="204" font-family="Arial, sans-serif" font-size="13" fill="#53657d">The combined notebook is broader than the specialist studies:</text>
  <text x="112" y="222" font-family="Arial, sans-serif" font-size="13" fill="#53657d">it compares multiple problems under one protocol rather than</text>
  <text x="112" y="240" font-family="Arial, sans-serif" font-size="13" fill="#53657d">pushing each problem to its absolute best standalone accuracy.</text>

  <text x="524" y="144" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Noise robustness sweep</text>
  <rect x="524" y="170" width="380" height="324" rx="16" fill="#fffaf4" stroke="#f0dfc2"/>
  <line x1="572" y1="444" x2="872" y2="444" stroke="#b98d4f" stroke-width="2"/>
  <line x1="572" y1="250" x2="572" y2="444" stroke="#b98d4f" stroke-width="2"/>
  <line x1="572" y1="347" x2="872" y2="347" stroke="#f5e6cf" stroke-width="1.5"/>
  <line x1="572" y1="250" x2="872" y2="250" stroke="#f5e6cf" stroke-width="1.5"/>
  <text x="524" y="448" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.250</text>
  <text x="524" y="351" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.253</text>
  <text x="524" y="254" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.257</text>
  <text x="566" y="466" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.00</text>
  <text x="696" y="466" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.05</text>
  <text x="850" y="466" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.20</text>
  <polyline fill="none" stroke="#c06d00" stroke-width="4" points="572,252 647,290 872,432"/>
  <circle cx="572" cy="252" r="6" fill="#c06d00"/>
  <circle cx="647" cy="290" r="6" fill="#c06d00"/>
  <circle cx="872" cy="432" r="6" fill="#c06d00"/>
  <text x="590" y="246" font-family="Arial, sans-serif" font-size="12" fill="#183153">0.25654</text>
  <text x="664" y="286" font-family="Arial, sans-serif" font-size="12" fill="#183153">0.25498</text>
  <text x="806" y="426" font-family="Arial, sans-serif" font-size="12" fill="#183153">0.25035</text>
  <text x="572" y="208" font-family="Arial, sans-serif" font-size="13" fill="#53657d">Error changes only modestly as synthetic noise increases,</text>
  <text x="572" y="226" font-family="Arial, sans-serif" font-size="13" fill="#53657d">which is the main robustness claim of the shared benchmark.</text>
</svg>