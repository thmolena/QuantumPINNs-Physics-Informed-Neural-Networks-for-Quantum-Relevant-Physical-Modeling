<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Quantum harmonic oscillator benchmark</title>
  <desc id="desc">Static visualization of harmonic oscillator PINN results showing relative L2 error by eigenstate and headline ground-state metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="512" rx="20" fill="#ffffff" stroke="#c7d8f7"/>

  <text x="56" y="72" font-family="Georgia, serif" font-size="30" fill="#183153">Harmonic-Oscillator Accuracy Benchmark</text>
  <text x="56" y="102" font-family="Arial, sans-serif" font-size="16" fill="#53657d">Source: outputs/qho_full_benchmark.csv</text>

  <rect x="56" y="126" width="250" height="132" rx="16" fill="#f4f8ff" stroke="#d6e4ff"/>
  <text x="78" y="160" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Ground-state relative L2</text>
  <text x="78" y="206" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0d4fb3">1.569e-3</text>
  <text x="78" y="236" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Near-analytic recovery for n = 0.</text>

  <rect x="328" y="126" width="250" height="132" rx="16" fill="#f7fbf5" stroke="#d5ead6"/>
  <text x="350" y="160" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Learned ground-state energy</text>
  <text x="350" y="206" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1b7f3b">0.50001526</text>
  <text x="350" y="236" font-family="Arial, sans-serif" font-size="15" fill="#53657d">Absolute energy error: 1.526e-5.</text>

  <rect x="600" y="126" width="304" height="132" rx="16" fill="#fff8ef" stroke="#f0d7b1"/>
  <text x="622" y="160" font-family="Arial, sans-serif" font-size="13" fill="#4d6482">Interpretation</text>
  <text x="622" y="192" font-family="Arial, sans-serif" font-size="16" fill="#183153">The specialist notebook is strongest on the</text>
  <text x="622" y="214" font-family="Arial, sans-serif" font-size="16" fill="#183153">canonical ground state and remains informative</text>
  <text x="622" y="236" font-family="Arial, sans-serif" font-size="16" fill="#183153">for higher modes with rising error.</text>

  <text x="56" y="306" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Relative L2 error by eigenstate</text>
  <line x1="92" y1="468" x2="476" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="92" y1="336" x2="92" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="92" y1="402" x2="476" y2="402" stroke="#dfe8f5" stroke-width="1.5"/>
  <line x1="92" y1="336" x2="476" y2="336" stroke="#dfe8f5" stroke-width="1.5"/>
  <text x="52" y="472" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0</text>
  <text x="44" y="406" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.55</text>
  <text x="44" y="340" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.10</text>

  <rect x="126" y="468" width="56" height="2" rx="8" fill="#0d4fb3"/>
  <text x="124" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=0</text>
  <text x="118" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0016</text>

  <rect x="218" y="467" width="56" height="1.4" rx="8" fill="#3174d6"/>
  <text x="216" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=1</text>
  <text x="210" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0117</text>

  <rect x="310" y="464" width="56" height="4.4" rx="8" fill="#5b8fe1"/>
  <text x="308" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=2</text>
  <text x="302" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0.0367</text>

  <rect x="402" y="336" width="56" height="132" rx="8" fill="#9ebef0"/>
  <text x="400" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=3</text>
  <text x="394" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.089</text>
  <text x="388" y="352" font-family="Arial, sans-serif" font-size="12" fill="#183153">largest error</text>

  <text x="548" y="306" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#183153">Energy error by state</text>
  <line x1="584" y1="468" x2="888" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="584" y1="344" x2="584" y2="468" stroke="#8aa4ca" stroke-width="2"/>
  <line x1="584" y1="406" x2="888" y2="406" stroke="#dfe8f5" stroke-width="1.5"/>
  <line x1="584" y1="344" x2="888" y2="344" stroke="#dfe8f5" stroke-width="1.5"/>
  <text x="552" y="472" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">0</text>
  <text x="530" y="410" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">3.3e-2</text>
  <text x="530" y="348" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">6.7e-2</text>

  <rect x="612" y="468" width="44" height="1" rx="6" fill="#1b7f3b"/>
  <rect x="688" y="463.5" width="44" height="4.5" rx="6" fill="#3a974f"/>
  <rect x="764" y="410.5" width="44" height="57.5" rx="6" fill="#7aba83"/>
  <rect x="840" y="457.1" width="44" height="10.9" rx="6" fill="#b7d8b6"/>
  <text x="611" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=0</text>
  <text x="687" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=1</text>
  <text x="763" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=2</text>
  <text x="839" y="491" font-family="Arial, sans-serif" font-size="13" fill="#183153">n=3</text>
  <text x="598" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.5e-5</text>
  <text x="675" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">2.4e-3</text>
  <text x="751" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">6.7e-2</text>
  <text x="827" y="520" font-family="Arial, sans-serif" font-size="12" fill="#6a7d96">1.3e-2</text>
</svg>